- id: SEA-TV-001
  name: Soundscape Manipulation
  vector: VISHING
  summary: >-
    Background audio validates the attacker's claimed environment and lowers target suspicion.
  description: >-
    Use of ambient audio — call center background noise, keyboard sounds, office chatter —
