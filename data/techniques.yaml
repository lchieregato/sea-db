  name: Catfishing / Honey Potting
  vector: SOCIAL
  summary: >-
    Romantic or intellectual persona built over time to leverage emotional trust for exploitation.
  description: >-
    Creation of a fictitious attractive persona that establishes a romantic or intellectual
    relationship with the target over time, eventually leveraging the emotional connection
