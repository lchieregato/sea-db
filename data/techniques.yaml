- id: SEA-TA-001
  name: Summary / Output Injection
  vector: AI
  summary: Poisoned source content makes an AI summary render the attacker's phishing CTA as part of its trusted output.
  description: >-
    An attacker embeds hidden or adversarial content in a web page or document so that an AI
    system summarizing it reproduces the attacker's malicious call-to-action inside its own
    output. The phishing link inherits the trust the user places in the AI assistant — not in
    any sender or domain.
  example: >-
    A user asks an assistant to summarize a product page; the generated summary ends with "A new
    device was added to your account — click here to review," a phishing link the user
    attributes to the assistant itself.
  detection: >-
    Treat links, buttons, and QR codes inside AI answers as untrusted, regardless of how
    authoritative the summary looks. Verify any account or security claim through the service's
    own app or a manually typed URL.
  forensic: >-
    Hidden or out-of-context instructional text present in the source page. Malicious URL
    appears only in model output and is absent from the user prompt. Click originates from the
    AI interface context.
