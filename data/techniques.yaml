- id: SEA-TS-009
  name: Session Hijacking via 2FA SE
  vector: SOCIAL
  summary: >-
    Target manipulated into sharing their own 2FA code under a false validation pretext.
  description: >-
    Manipulation of the target into providing a two-factor authentication code under a false
    pretext — "account validation", "giveaway entry", "feature unlock" — enabling real-time
    account takeover.
  example: >-
    An attacker messages a target claiming they need to "verify the account for a giveaway"
    and asks them to share the SMS code that "just arrived" — the code is actually their own
    2FA code for an attacker-initiated login.
  detection: >-
    Never share 2FA codes with anyone, regardless of reason or apparent legitimacy. A legitimate
    platform will never ask you to share your own authentication code.
  forensic: >-
