- id: SEA-TV-005
  name: Warm Transfer
  vector: VISHING
  summary: >-
    Established trust transferred to a second attacker who escalates the data request.
  description: >-
    After establishing initial trust, the attacker transfers the target to a second attacker
    posing as a supervisor or security specialist, leveraging accumulated trust and psychological
    exhaustion to extract more sensitive information.
  example: >-
    An initial caller establishes rapport as a tier-1 support agent, then "escalates" to a
    "security specialist" — the second attacker inherits the trust built by the first and
    requests increasingly sensitive data.
  detection: >-
    Being transferred to a more senior caller does not increase the legitimacy of the interaction.
    Treat the transferred call with the same scrutiny as the initial call.
