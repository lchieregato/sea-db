  - SEA-E-005
- id: SEA-TC-006
  name: Trusted-Platform Link/File Laundering
  vector: COLLABORATION
  summary: >-
    Malicious link or file delivered in-platform to bypass the email gateway and inherit the
    platform's trust.
  description: >-
    Delivery of a malicious link or file through the collaboration platform's chat or
    file-sharing rather than email — simultaneously bypassing the email security gateway and
    inheriting the platform's implicit trust, with the destination masked behind the platform's
    own preview or file-share interface.
  example: >-
    Instead of emailing a phishing link, where the gateway would scan it, the attacker shares
    it as a chat message or an uploaded file — the rendered preview and platform context make
    it appear safe.
  detection: >-
    Inspect the true destination of links and the origin of files shared in chat — the email
    gateway did not see them. A clean in-platform preview does not mean the destination is
    safe.
  forensic: >-
    Malicious URL or file first seen via the collaboration platform with no corresponding email
    gateway log. File hash flagged on analysis. Link destination domain unrelated to the
