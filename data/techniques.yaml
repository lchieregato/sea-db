- id: SEA-TS-006
  name: Affinity Infiltration
  vector: SOCIAL
  summary: >-
    Long-term community presence builds reputation before introducing malicious content.
  description: >-
    Long-term infiltration of closed communities — gaming clans, professional forums, interest
    groups — building a reputation as a trusted helpful member before introducing malicious
    links or files.
  example: >-
    An attacker joins a private cybersecurity Slack community, contributes genuinely useful
    content for months, then shares a "tool" download that contains an infostealer payload.
  detection: >-
    Long community tenure does not guarantee trustworthiness. Treat downloads from any community
    member with the same scrutiny regardless of their reputation.
  forensic: >-
