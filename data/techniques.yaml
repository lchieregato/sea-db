- id: SEA-TS-008
  name: Quid Pro Quo — Software/Cheats
  vector: SOCIAL
  summary: Technical game advantage offered in exchange for disabling security software.
  description: >-
    Offer of technical advantages in games or software — aimbots, skin mods, premium features
    — in exchange for disabling security software or executing an attacker-provided script.
  example: >-
