- id: SEA-TV-003
  name: Caller ID Spoofing
  vector: VISHING
  summary: Displayed caller ID spoofed to show a legitimate number the target recognizes.
  description: >-
    Technical manipulation of the displayed caller ID to show a legitimate phone number —
