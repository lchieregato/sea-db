  - SEA-E-004
- id: SEA-TC-005
  name: Guest Access / Shared-Channel Infiltration
  vector: COLLABORATION
  summary: >-
    An invited guest or shared-channel member operates from inside the workspace, appearing
    legitimate to build trust.
  description: >-
    Operating inside the organization's collaboration workspace as an invited guest or through
    a shared channel — appearing as a legitimate member — to build familiarity and then solicit
    data, distribute links, or stage further attacks from a trusted internal vantage point.
  example: >-
    An attacker invited as a guest to a project channel participates normally for weeks, then
