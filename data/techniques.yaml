  vector: SOCIAL
  summary: >-
    Username nearly identical to official account used for giveaway fraud or phishing links.
  description: >-
    Creation of social media accounts with usernames nearly identical to legitimate influencers
    or official brand accounts — using character substitutions — to run fraudulent giveaways
