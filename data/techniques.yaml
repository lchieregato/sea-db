  example: >-
    An attacker posing as IT support plays recorded call center background audio during the
    call, making the interaction feel like a legitimate help desk contact and lowering the
    target's suspicion.
  detection: >-
    Background noise cannot authenticate identity. Always verify caller identity through an
    official directory number before sharing any information, regardless of how the call environment
