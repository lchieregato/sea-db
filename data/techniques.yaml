- id: SEA-TC-001
  name: External Tenant Impersonation
  vector: COLLABORATION
  summary: >-
    External federated tenant spoofs an executive's display name to message staff from inside
    the collaboration platform.
  description: >-
    Abuse of cross-tenant federation in a collaboration platform — most notably Microsoft Teams
    — to message an internal employee from an attacker-controlled external tenant, with the
    display name set to a trusted executive or internal team. The platform's implicit trust and
    the chat medium, rather than email, lower the target's guard.
  example: >-
    A finance employee receives a Teams chat from "CEO — [Name]" originating from an external
    tenant, requesting an urgent payment — the platform's trust and the absence of an email
    gateway to inspect make the approach credible.
  detection: >-
    Treat the platform's "External" tag as a hard stop for any sensitive or financial request.
    Verify identity through a known internal channel before acting — display names are
    attacker-controlled.
  forensic: >-
    Message origin is an external or federated tenant unrelated to the organization. Display
    name matches an internal executive but the underlying domain or UPN does not. Tenant or
    account registered shortly before contact.
  mitre_attack:
  - T1566.003
  - T1199
  combinations:
  - SEA-TC-002
  - SEA-TC-004
  cross_references:
  - SEA-P-007
  - SEA-P-013
  - SEA-E-004
- id: SEA-TC-002
  name: Internal Account Lateral Messaging
  vector: COLLABORATION
  summary: >-
    Compromised internal account messages colleagues from inside the tenant, with no external
    warning and full institutional trust.
  description: >-
    Use of a compromised internal account to message colleagues from within the organization's
    own tenant — carrying no external warning and inheriting full institutional trust — to
    request transfers or credentials, or to spread malicious links laterally.
  example: >-
    An attacker who has taken over an employee's account messages the finance team asking to
    "update the supplier's banking details", with no external tag to signal that anything is
    wrong.
  detection: >-
    Apply the same verification to internal requests for payments or credentials as to external
    ones. An unusual request from a known colleague's account warrants an out-of-band check.
  forensic: >-
    Account activity inconsistent with the legitimate user's baseline — login geolocation,
    hours, device. Lateral messages to finance or IT shortly after an anomalous sign-in.
  mitre_attack:
  - T1078
  - T1534
  combinations:
  - SEA-TC-001
  - SEA-TE-014
  cross_references:
  - SEA-P-012
  - SEA-P-013
  - SEA-E-005
- id: SEA-TC-003
  name: OAuth Consent / Malicious App Grant
  vector: COLLABORATION
  summary: >-
    User is persuaded to grant a malicious app OAuth permissions that persist beyond password
    resets and MFA.
  description: >-
    Manipulation of a user into approving a malicious third-party application or add-in inside
    the collaboration platform, granting persistent OAuth permissions — mailbox, files, chat —
    that survive password changes and MFA.
  example: >-
    A message urges the target to "authorize the new collaboration tool to continue", leading
    to a legitimate-looking consent screen — approval grants the attacker standing access to
    files and messages.
  detection: >-
    Do not approve application permission requests you did not initiate. A consent screen
    requesting broad mailbox or file access for an unfamiliar app is a strong indicator — defer
    to your administrator.
  forensic: >-
    OAuth grant to a recently registered or unverified application. Token used from
    infrastructure unrelated to the user. Access persists after a credential reset.
