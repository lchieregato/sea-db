- id: SEA-TV-002
  name: IVR Phishing
  vector: VISHING
  summary: >-
    Automated IVR system collects credentials without any human attacker involvement.
  description: >-
    Use of automated interactive voice response systems to simulate legitimate institutions,
    inducing targets to enter sensitive data — passwords, tax IDs, account numbers — via telephone
    keypad without any human attacker involvement.
  example: >-
    A robocall impersonating a bank's IVR system asks the target to "confirm account details
    by pressing keys" — collecting credentials fully automated without requiring a live attacker.
  detection: >-
    Legitimate institutions never request full passwords or full account numbers via automated
    phone systems. Hang up and call back through the official number printed on your card
