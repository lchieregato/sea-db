  summary: >-
    Mirror account of a known contact used to request data or distribute malicious links.
  description: >-
    Creation of a fake social media account that mirrors a real person's profile — photos,
    bio, connections — to impersonate a known contact and request sensitive information or
    distribute malicious links.
  example: >-
    An attacker creates a fake LinkedIn profile identical to a target's known colleague, then
    connects with the target and shares a job opportunity link leading to a a collection page.
  detection: >-
    Verify unusual connection requests through a secondary channel before engaging. A duplicate
    profile of someone you already know is a strong indicator of cloning.
