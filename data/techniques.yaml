  - T1528
  - T1566.003
  combinations:
  - SEA-TC-001
  - SEA-TC-004
  cross_references:
  - SEA-P-007
  - SEA-P-006
  - SEA-E-002
- id: SEA-TC-004
  name: Webhook / Connector / Bot Spoofing
  vector: COLLABORATION
  summary: >-
    A webhook, connector, or bot impersonates a trusted internal system to issue an
    authoritative-looking request.
  description: >-
    Posting messages into a channel or direct chat through an incoming webhook, connector, or
    bot configured to impersonate a trusted system or automation — "Security Alerts", "IT
    Helpdesk", "HR Bot" — lending machine-authority to the attacker's request.
  example: >-
    An incoming webhook named "IT Security Bot" posts a channel message instructing staff to
    "re-authenticate at the link below due to a policy update", appearing as a sanctioned
    automated notice.
  detection: >-
    Automated and system messages are not inherently trustworthy — verify any action they
    request through the official IT or security channel. Govern who can create webhooks and
    connectors.
  forensic: >-
    Message delivered via an incoming webhook with no legitimate owner. Connector or bot added
    outside change control. Link destination unrelated to internal systems.
